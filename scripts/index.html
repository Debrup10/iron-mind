<!DOCTYPE html>
<html>
<head><title>Iron Mind Logic Engine</title></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (dataStr) => {
    try {
        // Parse the dynamic data sent by the LLM
        const params = JSON.parse(dataStr);
        const severityScore = params.severity || 5; // Default to 5 if missing

        return JSON.stringify({
            result: "Triage protocol loaded. Engage with the interface to restore executive function.",
            webview: {
                // Pass the severity to the UI via URL parameter
                url: `webview.html?severity=${severityScore}`, 
                aspectRatio: 1.5 
            }
        });
    } catch (e) {
        return JSON.stringify({ error: e.message });
    }
};
</script>
</body>
</html>
